<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Modern Shoe Store</title>
    <style>
        body {
            background: linear-gradient(135deg, #4B0082, #FFC0CB);
            font-family: Arial, sans-serif;
            color: white;
            overflow: hidden;
        }
        .hero {
            text-align: center;
            padding: 50px;
            animation: float 3s ease-in-out infinite;
        }
        @keyframes float {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-10px); }
        }
        .product-card {
            background: rgba(255, 255, 255, 0.1);
            border-radius: 15px;
            padding: 20px;
            margin: 15px;
            transition: transform 0.3s, box-shadow 0.3s;
        }
        .product-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.3);
        }
        .product-image {
            width: 100%;
            border-radius: 15px;
            backdrop-filter: blur(10px);
            animation: shimmer 1.5s infinite;
        }
        @keyframes shimmer {
            0% { background-position: -200px 0; }
            100% { background-position: 200px 0; }
        }
        h1 {
            background: linear-gradient(to right, #FF69B4, #8A2BE2);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
    </style>
</head>
<body>
    <div class="hero">
        <h1>Welcome to Our Modern Shoe Store</h1>
    </div>
    <div class="products">
        <div class="product-card">
            <img class="product-image" src="path/to/urban-runner-pro.jpg" alt="Urban Runner Pro">
            <h2>Urban Runner Pro</h2>
            <p>Price: $99.99</p>
        </div>
        <div class="product-card">
            <img class="product-image" src="path/to/classic-premium.jpg" alt="Classic Premium">
            <h2>Classic Premium</h2>
            <p>Price: $129.99</p>
        </div>
        <div class="product-card">
            <img class="product-image" src="path/to/street-king.jpg" alt="Street King">
            <h2>Street King</h2>
            <p>Price: $89.99</p>
        </div>
        <div class="product-card">
            <img class="product-image" src="path/to/elite-performance.jpg" alt="Elite Performance">
            <h2>Elite Performance</h2>
            <p>Price: $119.99</p>
        </div>
        <div class="product-card">
            <img class="product-image" src="path/to/casual-comfort.jpg" alt="Casual Comfort">
            <h2>Casual Comfort</h2>
            <p>Price: $79.99</p>
        </div>
        <div class="product-card">
            <img class="product-image" src="path/to/summit-hiker.jpg" alt="Summit Hiker">
            <h2>Summit Hiker</h2>
            <p>Price: $69.99</p>
        </div>
    </div>
</body>
</html>
