<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sneackers Sales</title>

<style>
* {margin:0; padding:0; box-sizing:border-box;}
body {
font-family: Arial;
background: linear-gradient(135deg,#020617,#0f172a);
color:white;
overflow-x:hidden;
}

/* NAV */
header {
padding:20px;
text-align:center;
font-size:24px;
font-weight:bold;
letter-spacing:2px;
animation: slideDown 1s ease;
}

@keyframes slideDown {
from {transform:translateY(-50px); opacity:0;}
to {transform:translateY(0); opacity:1;}
}

/* PRODUCTS */
.products {
display:grid;
grid-template-columns:repeat(auto-fit,minmax(250px,1fr));
gap:25px;
padding:40px;
}

.card {
background: rgba(255,255,255,0.05);
backdrop-filter: blur(10px);
border-radius:20px;
padding:15px;
text-align:center;
transition:0.4s;
transform:translateY(60px);
opacity:0;
}

/* HOVER ANIMATION */
.card:hover {
transform: scale(1.07) rotate(1deg);
box-shadow:0 20px 40px rgba(0,0,0,0.5);
}

/* IMAGE ANIMATION */
.card img {
width:100%;
border-radius:15px;
transition:0.4s;
}
.card:hover img {
transform:scale(1.1);
}

/* BUTTON */
button {
margin-top:10px;
padding:10px 15px;
border:none;
border-radius:10px;
background:#38bdf8;
cursor:pointer;
font-weight:bold;
transition:0.3s;
}
button:hover {
transform:scale(1.1);
}

/* CART */
#cartBtn {
position:fixed;
top:20px;
right:20px;
background:#38bdf8;
padding:12px;
border-radius:50%;
cursor:pointer;
}

#cartBox {
position:fixed;
top:0;
right:-320px;
width:300px;
height:100%;
background:#020617;
padding:20px;
transition:0.4s;
overflow:auto;
}

#cartBox.active {
right:0;
}

/* SCROLL ANIMATION ACTIVE */
.show {
transform:translateY(0);
opacity:1;
transition:0.6s;
}

</style>
</head>

<body>

<header>👟 Sneackers Sales</header>

<div id="cartBtn" onclick="toggleCart()">🛒</div>

<div id="cartBox">
<h2>Cart</h2>
<ul id="cartItems"></ul>
<p id="total">Total: $0</p>
<button onclick="checkout()">Order WhatsApp</button>
</div>

<section class="products">

<div class="card">
<img src="https://images.unsplash.com/photo-1600185365483-26d7a4cc7519">
<h3>Nike Air</h3>
<p>$120</p>
<button onclick="addToCart('Nike Air',120)">Add to Cart</button>
</div>

<div class="card">
<img src="https://images.unsplash.com/photo-1606813907291-d86efa9b94db">
<h3>Adidas Boost</h3>
<p>$140</p>
<button onclick="addToCart('Adidas Boost',140)">Add to Cart</button>
</div>

</section>

<script>
/* CART */
let cart = [];

function addToCart(name, price){
cart.push({name,price});
renderCart();
}

function renderCart(){
let list = document.getElementById("cartItems");
let total = 0;
list.innerHTML = "";

cart.forEach(item=>{
let li = document.createElement("li");
li.textContent = item.name + " - $" + item.price;
list.appendChild(li);
total += item.price;
});

document.getElementById("total").textContent = "Total: $" + total;
}

function toggleCart(){
document.getElementById("cartBox").classList.toggle("active");
}

function checkout(){
let phone="216XXXXXXXX";
let msg="Order:%0A";
cart.forEach(i=>{
msg+=i.name+" - $"+i.price+"%0A";
});
window.open("https://wa.me/"+phone+"?text="+msg);
}

/* SCROLL ANIMATION */
let cards = document.querySelectorAll(".card");

window.addEventListener("scroll", ()=>{
cards.forEach(card=>{
let top = card.getBoundingClientRect().top;
if(top < window.innerHeight - 100){
card.classList.add("show");
}
});
});
</script>

</body>
</html>
