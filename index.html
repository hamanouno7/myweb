<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sneakers E-commerce</title>
    <link rel="stylesheet" href="styles.css">
    <script src="script.js" defer></script>
</head>
<body>
    <header>
        <h1>Sneakers Sale</h1>
        <nav>
            <ul>
                <li><a href="#home">Home</a></li>
                <li><a href="#products">Products</a></li>
                <li><a href="#cart">Cart</a></li>
                <li><a href="#contact">Contact</a></li>
            </ul>
        </nav>
    </header>
    <main>
        <section id="home">
            <div class="hero">
                <h2>Shop the Latest Sneakers</h2>
                <p>Get the best deals on trendy sneakers.</p>
            </div>
        </section>
        <section id="products">
            <h2>Featured Products</h2>
            <div class="product-gallery">
                <div class="product-slide">
                    <img src="sneaker1.jpg" alt="Sneaker 1">
                    <div class="product-info">
                        <h3>Sneaker Model 1</h3>
                        <p>$100.00</p>
                        <button class="add-to-cart">Add to Cart</button>
                    </div>
                </div>
                <div class="product-slide">
                    <img src="sneaker2.jpg" alt="Sneaker 2">
                    <div class="product-info">
                        <h3>Sneaker Model 2</h3>
                        <p>$120.00</p>
                        <button class="add-to-cart">Add to Cart</button>
                    </div>
                </div>
            </div>
        </section>
        <section id="cart">
            <h2>Your Cart</h2>
            <div class="cart-items"></div>
            <button class="checkout-button">Checkout via WhatsApp</button>
            <button class="checkout-button">Checkout via Instagram</button>
        </section>
        <section id="contact">
            <h2>Contact Us</h2>
            <form>
                <input type="text" placeholder="Your Name" required>
                <input type="email" placeholder="Your Email" required>
                <textarea placeholder="Your Message" required></textarea>
                <button type="submit">Send Message</button>
            </form>
        </section>
    </main>
    <footer>
        <p>&copy; 2026 Sneakers Sale. All rights reserved.</p>
    </footer>
</body>
</html>
